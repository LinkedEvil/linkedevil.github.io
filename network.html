<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedEvil — Minha Rede</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/network.css">
  <link rel="stylesheet" href="css/consent.css">
</head>
<body>

<div id="navBar"></div>

<div class="network-page">
  <!-- Cabeçalho com tabs -->
  <div class="network-header">
    <h1>Sua Rede</h1>
    <div class="network-tabs">
      <div class="network-tab active">Conexões</div>
      <div class="network-tab">Contatos</div>
      <div class="network-tab">Páginas</div>
      <div class="network-tab">Grupos</div>
    </div>
  </div>

  <!-- Convites pendentes -->
  <div class="invitations-section">
    <p class="invitations-title" id="invitationsTitle">Convites pendentes</p>
    <div id="invitationsContainer"></div>
  </div>

  <!-- Grid de conexões -->
  <p class="connections-title">Conexões</p>
  <div class="network-grid" id="connectionsGrid"></div>

  <div id="networkFooter"></div>
</div>

<div class="dark-mode-toggle">
  <button onclick="App.toggleDarkMode()" title="Modo Evil">😈</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/consent.js"></script>
<script src="js/network.js"></script>
</body>
</html>
