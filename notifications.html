<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="google-adsense-account" content="ca-pub-2855595619421919">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedEvil — Notificações</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/consent.css">
</head>
<body>

<div id="navBar"></div>

<div class="notifications-page">
  <!-- Cabeçalho -->
  <div class="notifications-header">
    <h1>Notificações</h1>
    <div class="notifications-header-actions">
      <button class="btn-secondary" style="font-size:14px;padding:6px 16px" onclick="markAllRead()">
        Marcar todas como lidas
      </button>
      <button class="btn-tertiary" style="font-size:14px;padding:6px 16px" title="Configurações">⚙️</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="notification-tabs">
    <div class="notification-tab active"       data-filter="all">Todas</div>
    <div class="notification-tab"              data-filter="like">Recomendações</div>
    <div class="notification-tab"              data-filter="mention">Menções</div>
    <div class="notification-tab"              data-filter="birthday">Aniversários</div>
  </div>

  <!-- Lista renderizada por notifications.js -->
  <div id="notificationsList"></div>

  <div id="notificationsFooter"></div>
</div>

<div class="dark-mode-toggle">
  <button onclick="App.toggleDarkMode()" title="Modo Evil">😈</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/consent.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
