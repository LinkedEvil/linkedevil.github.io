<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-2855595619421919">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9REW3CCSJQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent', 'default', {
      analytics_storage:       'denied',
      ad_storage:              'denied',
      ad_user_data:            'denied',
      ad_personalization:      'denied',
      functionality_storage:   'denied',
      personalization_storage: 'denied',
      security_storage:        'granted',
      wait_for_update:         2000
    });
    gtag('js', new Date());
    gtag('config', 'G-9REW3CCSJQ');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedEvil — Notificações</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/consent.css">
</head>
<body>

<div id="navBar"></div>

<div class="notifications-page">
  <div class="notifications-header">
    <h1 data-i18n="notifications.title">Notificações</h1>
    <div class="notifications-header-actions">
      <button class="btn-secondary" style="font-size:14px;padding:6px 16px" onclick="markAllRead()" data-i18n="notifications.markAll">
        Marcar todas como lidas
      </button>
      <button class="btn-tertiary" style="font-size:14px;padding:6px 16px" title="Configurações">⚙️</button>
    </div>
  </div>

  <div class="notification-tabs">
    <div class="notification-tab active" data-filter="all" data-i18n="notifications.all">Todas</div>
    <div class="notification-tab"        data-filter="like" data-i18n="notifications.likes">Recomendações</div>
    <div class="notification-tab"        data-filter="mention" data-i18n="notifications.mentions">Menções</div>
    <div class="notification-tab"        data-filter="birthday" data-i18n="notifications.birthdays">Aniversários</div>
  </div>

  <div id="notificationsList"></div>

  <div id="notificationsFooter"></div>
</div>

<!-- Botão de paródia -->
<div class="dark-mode-toggle">
  <button onclick="App.openParodyModal()" data-i18n-title="evil.title" title="Aviso de Paródia">😈</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/consent.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
