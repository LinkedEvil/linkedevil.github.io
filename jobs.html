<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="google-adsense-account" content="ca-pub-2855595619421919">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedEvil — Vagas</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/jobs.css">
  <link rel="stylesheet" href="css/consent.css">
</head>
<body>

<div id="navBar"></div>

<div class="jobs-page">
  <div class="jobs-header">
    <h1 data-i18n="jobs.title">Vagas de Emprego</h1>
    <div class="jobs-search">
      <input type="text" id="jobSearch"
        data-i18n-placeholder="jobs.placeholder"
        placeholder="Cargo, empresa ou habilidade..."
        oninput="searchJobs()" onkeypress="if(event.key==='Enter') searchJobs()">
      <input type="text" data-i18n-placeholder="jobs.location" placeholder="Localização">
      <button onclick="searchJobs()" data-i18n="jobs.search">Pesquisar</button>
    </div>
  </div>

  <p class="jobs-list-title" data-i18n="jobs.recommended">Recomendadas para você</p>
  <div id="jobsList"></div>

  <div id="jobsFooter"></div>
</div>

<!-- Botão de paródia -->
<div class="dark-mode-toggle">
  <button onclick="App.openParodyModal()" data-i18n-title="evil.title" title="Aviso de Paródia">😈</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/consent.js"></script>
<script src="js/jobs.js"></script>
</body>
</html>
