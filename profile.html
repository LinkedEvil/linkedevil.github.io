<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="google-adsense-account" content="ca-pub-2855595619421919">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedEvil — Perfil</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/consent.css">
</head>
<body>

<div id="navBar"></div>

<div class="profile-page">
  <!-- Banner -->
  <div class="profile-banner" id="profileBanner"></div>

  <!-- Card principal -->
  <div class="profile-main-card">
    <div class="profile-avatar-large" id="profileAvatar"></div>
    <div class="profile-name-section">
      <div class="profile-name-left">
        <h1 id="profileName"></h1>
        <div class="profile-tagline" id="profileTagline"></div>
        <div class="profile-location"  id="profileLocation"></div>
        <div class="profile-connections-info" id="profileConnections"></div>
      </div>
      <div class="profile-actions" id="profileActions"></div>
    </div>
    <div id="profileOpenTo"></div>
  </div>

  <!-- Sobre -->
  <div class="profile-section">
    <h2>Sobre</h2>
    <p id="profileSummary"></p>
  </div>

  <!-- Experiência -->
  <div class="profile-section">
    <h2>Experiência</h2>
    <div id="profileExperience"></div>
  </div>

  <!-- Formação -->
  <div class="profile-section">
    <h2>Formação acadêmica</h2>
    <div id="profileEducation"></div>
  </div>

  <!-- Competências -->
  <div class="profile-section">
    <h2>Competências</h2>
    <div id="profileSkills"></div>
  </div>

  <div id="profileFooter"></div>
</div>

<div class="dark-mode-toggle">
  <button onclick="App.toggleDarkMode()" title="Modo Evil">😈</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/consent.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
